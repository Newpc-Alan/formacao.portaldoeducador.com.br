<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Certificado | Portal do Educador</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#1a6b2a; --verde-cl:#22963a; --azul:#0f2c4a; --azul-2:#163d63;
    --ciano:#37B1DA; --tinta:#0c1825; --papel:#f7f9fb; --papel-2:#eef2f7;
    --linha:#e2e8f0; --tx:#1f2b3a; --tx-suave:#5b6b7d; --branco:#fff;
    --ok:#15803d; --ok-bg:#dcfce7; --erro:#c0392b; --erro-bg:#fde8e6;
    --sombra-md:0 4px 12px rgba(15,44,74,.08),0 12px 32px rgba(15,44,74,.10);
    --sombra-lg:0 18px 48px rgba(15,44,74,.16); --r:18px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased;
    min-height:100vh;background:radial-gradient(120% 80% at 50% 0%,#eaf1f8,var(--papel));
    display:flex;align-items:flex-start;justify-content:center;padding:40px 18px;}
  h1,h2,h3{font-family:'Sora',sans-serif;margin:0;letter-spacing:-.01em;}
  .wrap{width:100%;max-width:540px;}

  .vc-head{text-align:center;margin-bottom:24px;}
  .vc-logo{width:60px;height:60px;border-radius:50%;margin:0 auto 14px;overflow:hidden;
    border:3px solid #fff;box-shadow:var(--sombra-md);background:var(--tinta);}
  .vc-logo img{width:100%;height:100%;object-fit:cover;display:block;}
  .vc-head .eyebrow{font-size:.74rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--verde);}
  .vc-head h1{font-size:1.5rem;color:var(--tinta);margin-top:8px;}
  .vc-head p{font-size:.9rem;color:var(--tx-suave);margin-top:8px;line-height:1.5;}

  .vc-card{background:#fff;border:1px solid var(--linha);border-radius:var(--r);padding:26px;box-shadow:var(--sombra-md);}
  label{display:block;font-size:.78rem;font-weight:600;margin-bottom:7px;color:var(--tx);}
  .vc-inrow{display:flex;gap:10px;}
  input{flex:1;padding:13px 15px;border:1px solid var(--linha);border-radius:12px;font-size:1rem;
    font-family:'Inter';background:var(--papel);letter-spacing:.04em;text-transform:uppercase;transition:border .15s,box-shadow .15s,background .15s;}
  input:focus{outline:none;border-color:var(--ciano);background:#fff;box-shadow:0 0 0 3px rgba(55,177,218,.16);}
  .vc-btn{padding:13px 22px;border-radius:12px;border:none;cursor:pointer;font-family:'Inter';font-weight:600;
    font-size:.92rem;color:#fff;background:var(--verde);transition:background .2s,transform .1s;white-space:nowrap;}
  .vc-btn:hover{background:var(--verde-cl);}
  .vc-btn:active{transform:translateY(1px);}
  .vc-btn:disabled{background:#aab6c4;cursor:not-allowed;}
  .vc-hint{font-size:.78rem;color:var(--tx-suave);margin-top:10px;text-align:center;}

  /* estados */
  .vc-state{margin-top:20px;display:none;}
  .vc-state.on{display:block;}
  .vc-loading{text-align:center;color:var(--tx-suave);font-size:.9rem;padding:10px;}

  .vc-result{border-radius:var(--r);overflow:hidden;border:1px solid var(--linha);}
  .vc-result-top{padding:18px 22px;display:flex;align-items:center;gap:13px;}
  .vc-result-top.ok{background:var(--ok-bg);}
  .vc-result-top.no{background:var(--erro-bg);}
  .vc-result-ico{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .vc-result-ico.ok{background:var(--ok);}
  .vc-result-ico.no{background:var(--erro);}
  .vc-result-ico svg{width:22px;height:22px;}
  .vc-result-top h3{font-size:1.05rem;}
  .vc-result-top.ok h3{color:var(--ok);}
  .vc-result-top.no h3{color:var(--erro);}
  .vc-result-top small{display:block;font-size:.78rem;color:var(--tx-suave);font-weight:400;margin-top:2px;font-family:'Inter';}

  .vc-result-body{padding:6px 22px 20px;background:#fff;}
  .vc-field{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--papel-2);}
  .vc-field:last-child{border-bottom:none;}
  .vc-field .k{font-size:.8rem;color:var(--tx-suave);}
  .vc-field .v{font-size:.9rem;color:var(--tx);font-weight:600;text-align:right;}
  .vc-result-foot{padding:14px 22px;background:var(--papel);font-size:.74rem;color:var(--tx-suave);text-align:center;border-top:1px solid var(--linha);}

  .vc-again{margin-top:16px;text-align:center;}
  .vc-again button{background:none;border:none;color:var(--azul);font-size:.84rem;font-weight:600;cursor:pointer;font-family:'Inter';text-decoration:underline;}

  .vc-foot{text-align:center;margin-top:22px;font-size:.76rem;color:var(--tx-suave);}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="vc-head">
    <div class="vc-logo"><img id="vc-logo-img" alt="Portal do Educador"></div>
    <div class="eyebrow">Portal do Educador</div>
    <h1>Verificação de Certificado</h1>
    <p>Informe o código impresso no certificado para confirmar sua autenticidade nos registros do Portal do Educador.</p>
  </div>

  <div class="vc-card">
    <label for="vc-codigo">Código de verificação</label>
    <div class="vc-inrow">
      <input type="text" id="vc-codigo" placeholder="PE-XXXXXXXX" autocomplete="off" maxlength="20">
      <button class="vc-btn" id="vc-btn" data-action="verificar">Verificar</button>
    </div>
    <div class="vc-hint">O código aparece no rodapé do certificado, no formato PE-XXXXXXXX.</div>

    <div class="vc-state" id="vc-loading-box">
      <div class="vc-loading">Consultando registros...</div>
    </div>

    <div class="vc-state" id="vc-result-box"></div>
  </div>

  <div class="vc-foot">NEWPC Tecnologia · CNPJ 20.892.343/0001-15</div>
</div>

let db=null, fbOk=false;

const SVG_OK='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const SVG_NO='<svg viewBox="0 0 24 24" fill="none"><path d="M7 7l10 10M17 7L7 17" stroke="#fff" stroke-width="2.6" stroke-linecap="round"/></svg>';

function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.firestore(); fbOk=true;
  }catch(e){ console.error(e); }
}

function escapeHtml(s){ if(s==null)return""; return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function fmtData(ts){
  try{
    if(ts&&ts.toDate){ const d=ts.toDate(); return String(d.getDate()).padStart(2,'0')+"/"+String(d.getMonth()+1).padStart(2,'0')+"/"+d.getFullYear(); }
  }catch(e){}
  return "—";
}

function normCodigo(raw){
  let c=(raw||"").trim().toUpperCase().replace(/\s/g,"");
  if(c && c.indexOf("PE-")!==0 && /^[A-Z0-9]+$/.test(c)) c="PE-"+c; // tolera digitar sem o prefixo
  return c;
}

function show(box){
  document.getElementById("vc-loading-box").classList.toggle("on", box==="loading");
  document.getElementById("vc-result-box").classList.toggle("on", box==="result");
}

function verificar(){
  const codigo=normCodigo(document.getElementById("vc-codigo").value);
  if(!codigo || codigo.length<5){ render(false); return; }
  if(!fbOk){ render(false,"Serviço indisponível no momento."); return; }
  document.getElementById("vc-codigo").value=codigo;
  document.getElementById("vc-btn").disabled=true;
  show("loading");
  document.getElementById("vc-result-box").classList.remove("on");

  db.collection("certificados").where("codigo","==",codigo).get().then(snap=>{
    document.getElementById("vc-btn").disabled=false;
    if(snap.empty){ render(false); return; }
    // se houver mais de um (colisão raríssima), pega o mais recente
    let docs=[]; snap.forEach(d=> docs.push(d.data()));
    docs.sort((a,b)=>{
      const ta=a.emitido_em&&a.emitido_em.seconds?a.emitido_em.seconds:0;
      const tb=b.emitido_em&&b.emitido_em.seconds?b.emitido_em.seconds:0;
      return tb-ta;
    });
    render(true, null, docs[0], codigo);
  }).catch(e=>{
    console.error(e); document.getElementById("vc-btn").disabled=false; render(false,"Não foi possível consultar agora.");
  });
}

function render(valido, msgErro, cert, codigo){
  const box=document.getElementById("vc-result-box");
  show("result");
  if(valido && cert){
    box.innerHTML=`
      <div class="vc-result">
        <div class="vc-result-top ok">
          <div class="vc-result-ico ok">${SVG_OK}</div>
          <div><h3>Certificado válido</h3><small>Registro confirmado nos arquivos do Portal do Educador</small></div>
        </div>
        <div class="vc-result-body">
          <div class="vc-field"><span class="k">Nome</span><span class="v">${escapeHtml(cert.cursista_nome||"—")}</span></div>
          <div class="vc-field"><span class="k">Curso</span><span class="v">${escapeHtml(cert.curso_titulo||"—")}</span></div>
          <div class="vc-field"><span class="k">Carga horária</span><span class="v">${cert.carga_horaria||0} horas</span></div>
          <div class="vc-field"><span class="k">Emitido em</span><span class="v">${fmtData(cert.emitido_em)}</span></div>
        </div>
        <div class="vc-result-foot">Código ${escapeHtml(codigo||"")}</div>
      </div>
      <div class="vc-again"><button data-action="nova-consulta">Verificar outro código</button></div>`;
  }else{
    box.innerHTML=`
      <div class="vc-result">
        <div class="vc-result-top no">
          <div class="vc-result-ico no">${SVG_NO}</div>
          <div><h3>Certificado não encontrado</h3><small>${escapeHtml(msgErro||"Nenhum registro corresponde a este código.")}</small></div>
        </div>
        <div class="vc-result-body">
          <div class="vc-field"><span class="k">O que fazer</span><span class="v" style="font-weight:400;max-width:60%;">Confira se o código foi digitado corretamente, exatamente como aparece no certificado.</span></div>
        </div>
      </div>
      <div class="vc-again"><button data-action="nova-consulta">Tentar novamente</button></div>`;
  }
}

function novaConsulta(){
  show("");
  document.getElementById("vc-result-box").classList.remove("on");
  const inp=document.getElementById("vc-codigo"); inp.value=""; inp.focus();
}

/* ---------- listener ---------- */
document.addEventListener("click",function(ev){
  const el=ev.target.closest("[data-action]"); if(!el)return;
  const a=el.getAttribute("data-action");
  if(a==="verificar") verificar();
  else if(a==="nova-consulta") novaConsulta();
});
document.getElementById("vc-codigo").addEventListener("keydown",function(ev){ if(ev.key==="Enter") verificar(); });

/* ---------- boot ---------- */
document.getElementById("vc-logo-img").src=LOGO_B64;
initFirebase();
/* aceita código pela URL: ?codigo=PE-XXXX (futuro QR) */
(function(){
  const params=new URLSearchParams(window.location.search);
  const c=params.get("codigo")||params.get("id");
  if(c){ document.getElementById("vc-codigo").value=c; setTimeout(verificar, 400); }
})();
</script>
</body>
</html>
